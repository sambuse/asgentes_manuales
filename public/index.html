<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agente Manuales</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #00e5a0;
    --accent-dim: rgba(0, 229, 160, 0.12);
    --text: #e8e8f0;
    --text-muted: #6b6b80;
    --user-bg: #1a2a3a;
    --user-border: #2a4a6a;
    --bot-bg: #111820;
    --bot-border: #1a3028;
    --danger: #ff4466;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  header {
    padding: 14px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .logo {
    width: 32px;
    height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: #000;
    flex-shrink: 0;
  }

  .header-info h1 {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.01em;
  }

  .header-info span {
    font-size: 11px;
    color: var(--accent);
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.05em;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    background: var(--accent);
    border-radius: 50%;
    margin-left: auto;
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Chat */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .mensaje {
    max-width: 85%;
    padding: 12px 15px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.6;
    animation: fadeUp 0.2s ease;
    border: 1px solid transparent;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .user {
    background: var(--user-bg);
    border-color: var(--user-border);
    align-self: flex-end;
    border-bottom-right-radius: 3px;
  }

  .bot {
    background: var(--bot-bg);
    border-color: var(--bot-border);
    align-self: flex-start;
    border-bottom-left-radius: 3px;
    position: relative;
  }

  .bot::before {
    content: 'IA';
    position: absolute;
    top: -8px;
    left: 10px;
    font-size: 9px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--accent);
    background: var(--bg);
    padding: 0 4px;
    letter-spacing: 0.1em;
  }

  .typing {
    display: flex;
    gap: 5px;
    padding: 14px 16px;
    align-items: center;
  }

  .typing span {
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
    opacity: 0.6;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--text-muted);
    text-align: center;
    padding: 40px;
  }

  .empty-icon {
    font-size: 36px;
    margin-bottom: 6px;
    opacity: 0.5;
  }

  .empty-state p { font-size: 13px; line-height: 1.6; }

  /* Input */
  #inputArea {
    padding: 12px 16px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  #input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    outline: none;
    resize: none;
    max-height: 120px;
    min-height: 44px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }

  #input::placeholder { color: var(--text-muted); }
  #input:focus { border-color: var(--accent); }

  #sendBtn {
    width: 44px;
    height: 44px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s, transform 0.1s;
  }

  #sendBtn:active { transform: scale(0.93); }
  #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }

  #sendBtn svg { width: 18px; height: 18px; }

  .error {
    border-color: var(--danger) !important;
    color: var(--danger);
    font-size: 13px;
  }
</style>
</head>

<body>

<header>
  <div class="logo">M</div>
  <div class="header-info">
    <h1>Agente Manuales</h1>
    <span>MISTRAL · GROQ</span>
  </div>
  <div class="status-dot"></div>
</header>

<div id="chat">
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">📋</div>
    <p>Hacé tus preguntas sobre<br>los manuales de la tienda</p>
  </div>
</div>

<div id="inputArea">
  <textarea
    id="input"
    placeholder="Escribe tu pregunta..."
    rows="1"
  ></textarea>
  <button id="sendBtn" onclick="enviar()">
    <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"/>
      <polygon points="22 2 15 22 11 13 2 9 22 2"/>
    </svg>
  </button>
</div>

<script>
  const chat = document.getElementById("chat");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("sendBtn");
  const emptyState = document.getElementById("emptyState");
  let loading = false;

  // Auto-resize textarea
  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 120) + "px";
  });

  // Enter para enviar (Shift+Enter = nueva línea)
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      enviar();
    }
  });

  function agregarMensaje(texto, tipo) {
    if (emptyState) emptyState.remove();

    const div = document.createElement("div");
    div.className = "mensaje " + tipo;
    div.innerText = texto;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function mostrarTyping() {
    const div = document.createElement("div");
    div.className = "mensaje bot typing";
    div.id = "typing";
    div.innerHTML = "<span></span><span></span><span></span>";
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function quitarTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  async function enviar() {
    const mensaje = input.value.trim();
    if (!mensaje || loading) return;

    loading = true;
    sendBtn.disabled = true;
    input.value = "";
    input.style.height = "auto";

    agregarMensaje(mensaje, "user");
    mostrarTyping();

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ mensaje })
      });

      quitarTyping();

      if (!res.ok) throw new Error("Error del servidor");

      const data = await res.json();
      agregarMensaje(data.respuesta, "bot");

    } catch (err) {
      quitarTyping();
      const errDiv = agregarMensaje("Error al conectar. Intenta de nuevo.", "bot");
      errDiv.classList.add("error");
    }

    loading = false;
    sendBtn.disabled = false;
    input.focus();
  }
</script>

</body>
</html>
